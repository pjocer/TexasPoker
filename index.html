<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德州扑克</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 登录/注册界面 -->
    <div id="auth-screen">
        <div class="setup-container">
            <h1>TEXAS POKER</h1>
            <p class="subtitle">德州扑克</p>

            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">登录</div>
                <div class="auth-tab" data-tab="register">注册</div>
            </div>

            <!-- 登录表单 -->
            <div id="auth-login">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" maxlength="12">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码">
                </div>
                <button class="start-btn" id="login-btn">登 录</button>
            </div>

            <!-- 注册表单 -->
            <div id="auth-register" style="display:none;">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="register-username" placeholder="2-12 个字符" maxlength="12">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="register-password" placeholder="至少 4 个字符">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="register-password-confirm" placeholder="再次输入密码">
                </div>
                <button class="start-btn" id="register-btn">注 册</button>
            </div>

            <div id="auth-message" class="auth-message"></div>
        </div>
    </div>

    <!-- 用户徽章 (登录后显示) -->
    <div id="user-badge" class="user-badge" style="display:none;">
        <span id="badge-nickname" class="user-badge-name"></span>
        <div id="badge-avatar" class="user-badge-avatar"></div>
    </div>

    <!-- 个人信息设置页 -->
    <div id="profile-screen" style="display:none;">
        <div class="setup-container">
            <h1>TEXAS POKER</h1>
            <p class="subtitle">个人信息</p>

            <div class="profile-avatar-section">
                <div id="profile-avatar-preview" class="profile-avatar-preview"></div>
                <p id="profile-avatar-hint" class="profile-avatar-hint">当前使用角色默认头像</p>
                <button class="profile-upload-btn" id="profile-upload-btn">上传本地图片</button>
                <button class="profile-upload-btn secondary" id="profile-use-preset-btn">使用角色头像</button>
                <input type="file" id="avatar-file-input" accept="image/*" style="display:none;">
            </div>

            <div class="profile-character-summary">
                <div id="profile-character-full" class="profile-character-full"></div>
                <div class="profile-character-meta">
                    <p id="profile-character-name" class="profile-character-name"></p>
                    <p id="profile-character-title" class="profile-character-title"></p>
                </div>
            </div>

            <p class="profile-section-title">选择角色形象</p>
            <div id="profile-character-list" class="profile-character-list"></div>

            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="profile-nickname" placeholder="输入昵称" maxlength="12">
            </div>
            <button class="start-btn" id="profile-save-btn">保存昵称和头像</button>

            <div class="profile-divider"></div>

            <p class="profile-section-title">修改密码</p>
            <div class="form-group">
                <label>当前密码</label>
                <input type="password" id="profile-current-password" placeholder="输入当前密码">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="profile-new-password" placeholder="至少 4 个字符">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="profile-confirm-password" placeholder="再次输入新密码">
            </div>
            <button class="start-btn" id="profile-password-btn">修改密码</button>

            <div id="profile-message" class="auth-message"></div>

            <button class="back-btn" id="profile-back-btn">返回</button>
        </div>
    </div>

    <!-- 启动界面 -->
    <div id="setup-screen" style="display:none;">
        <div class="setup-layout">
            <div class="setup-container">
                <h1>TEXAS POKER</h1>
                <p class="subtitle">德州扑克</p>

                <!-- 模式选择: 单机 / 联网 -->
                <div class="form-group">
                    <label>游戏类型</label>
                    <div class="mode-selector">
                        <div class="play-mode-btn active" data-play-mode="local">
                            <div class="mode-title">单机模式</div>
                            <div class="mode-desc">与AI对战</div>
                        </div>
                        <div class="play-mode-btn" data-play-mode="online">
                            <div class="mode-title">联网模式</div>
                            <div class="mode-desc">多人对战</div>
                        </div>
                    </div>
                </div>

                <!-- 单机模式设置 (联网模式下也用于创建房间) -->
                <div id="local-settings">
                    <div class="form-group">
                        <label>游戏模式</label>
                        <div class="mode-selector">
                            <div class="mode-btn active" data-mode="standard">
                                <div class="mode-title">标准德州</div>
                                <div class="mode-desc">52张牌 (2-A)</div>
                            </div>
                            <div class="mode-btn" data-mode="shortDeck">
                                <div class="mode-title">短牌德州</div>
                                <div class="mode-desc">36张牌 (6-A)</div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>玩家人数 (含你自己)</label>
                        <select id="player-count">
                            <option value="2">2 人</option>
                            <option value="3">3 人</option>
                            <option value="4">4 人</option>
                            <option value="5">5 人</option>
                            <option value="6" selected>6 人</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>起始筹码</label>
                        <input type="number" id="starting-chips" value="1000" min="100" step="100">
                    </div>

                    <div class="form-group">
                        <label>小盲注</label>
                        <input type="number" id="small-blind" value="10" min="1">
                    </div>

                    <div class="form-group">
                        <label>大盲注</label>
                        <input type="number" id="big-blind" value="20" min="2">
                    </div>
                </div>

                <!-- 联网模式: 玩家名 -->
                <div id="online-name-group" class="form-group" style="display:none;">
                    <label>你的名字</label>
                    <input type="text" id="player-name" placeholder="输入名字" maxlength="10" value="">
                </div>

                <button class="start-btn" id="start-btn">开始游戏</button>

                <!-- 联网模式按钮 -->
                <div id="online-buttons" style="display:none;">
                    <button class="start-btn" id="create-room-btn">创建房间</button>
                    <div class="room-join-row">
                        <input type="text" id="room-id-input" placeholder="输入房间号" maxlength="4" class="room-input">
                        <button class="start-btn join-btn" id="join-room-btn">加入房间</button>
                    </div>
                </div>
            </div>

            <aside class="setup-character-panel">
                <p class="setup-character-label">当前角色</p>
                <div id="setup-fullbody-display" class="setup-fullbody-display"></div>
                <div class="setup-character-copy">
                    <p id="setup-character-name" class="setup-character-name"></p>
                    <p id="setup-character-title" class="setup-character-title"></p>
                </div>
                <div class="setup-avatar-row">
                    <div id="setup-avatar-preview" class="setup-avatar-preview"></div>
                    <p id="setup-avatar-mode" class="setup-avatar-mode"></p>
                </div>
            </aside>
        </div>
    </div>

    <!-- 房间等待界面 -->
    <div id="room-screen" style="display:none;">
        <div class="setup-container">
            <h1>TEXAS POKER</h1>
            <p class="subtitle">房间 <span id="room-id-display"></span></p>

            <div class="room-info">
                <div class="room-settings-info" id="room-settings-info"></div>
                <div class="room-players-list" id="room-players-list"></div>
            </div>

            <div id="room-host-controls" style="display:none;">
                <button class="start-btn" id="room-start-btn">开始游戏</button>
            </div>
            <p id="room-wait-msg" class="subtitle">等待房主开始游戏...</p>

            <button class="back-btn" id="room-back-btn">离开房间</button>
        </div>
    </div>

    <!-- 游戏界面 -->
    <div id="game-screen">
        <button class="back-btn game-leave-btn" id="game-leave-btn">离开牌桌</button>
        <!-- 信息面板 -->
        <div class="info-panel">
            <div class="game-mode-label">标准德州</div>
            <div class="hand-number">第 0 手</div>
        </div>

        <!-- 日志面板 -->
        <div class="log-panel">
            <h3>游戏日志</h3>
            <div class="log-content"></div>
        </div>

        <!-- 牌桌区域 -->
        <div class="table-area">
            <div class="table-felt"></div>

            <!-- 底池 -->
            <div class="pot-display">
                <div class="pot-label">POT</div>
                <div class="pot-amount">0</div>
            </div>

            <!-- 公共牌 -->
            <div class="community-cards"></div>
        </div>

        <!-- 操作面板 -->
        <div class="action-panel hidden"></div>

        <!-- 下一手/重新开始 -->
        <button class="next-hand-btn hidden">开始下一手牌</button>
        <button class="restart-btn hidden">返回主菜单</button>
    </div>

    <!-- 头像裁剪弹窗 -->
    <div id="crop-modal" class="crop-modal" style="display:none;">
        <div class="crop-wrapper">
            <p class="crop-title">裁剪头像</p>
            <div class="crop-area" id="crop-area">
                <canvas id="crop-canvas"></canvas>
                <div class="crop-circle-overlay"></div>
            </div>
            <p class="crop-hint">拖动调整位置，滚轮缩放大小</p>
            <div class="crop-actions">
                <button class="back-btn" id="crop-cancel-btn">取消</button>
                <button class="start-btn" id="crop-confirm-btn">确认裁剪</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/constants.js"></script>
    <script src="js/card.js"></script>
    <script src="js/deck.js"></script>
    <script src="js/evaluator.js"></script>
    <script src="js/player.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/game.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/network.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
